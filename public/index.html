<!DOCTYPE html>
<html>

<head>
    <title>Advanced Upload</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 450px;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
        }

        .drop {
            border: 2px dashed #64748b;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .progress {
            height: 10px;
            background: #334155;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: #22c55e;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <form id="uploadForm" onsubmit="(e)=>e.preventDefault();return false;">
            <h2>Upload File</h2>

            <div class="drop" id="drop">
                Drag & Drop File
            </div>

            <input type="file" id="file">

            <button onclick="startUpload()">Start Upload</button>
            <button onclick="pauseUpload()">Pause</button>
            <button onclick="resumeUpload()">Resume</button>
        </form>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <div id="status"></div>
        <div id="link"></div>

    </div>

    <script>

        const PARALLEL = Math.min(navigator.hardwareConcurrency || 4, 6)

        let file
        let uploadId = localStorage.getItem("uploadToken")

        let paused = false

        let nextChunk = 0
        let totalChunks = 0
        let completedChunks = 0
        let CHUNK_SIZE = 8 * 1024 * 1024


        /* ---------------- HASH WORKER POOL ---------------- */

        const HASH_WORKERS = 4
        const workerPool = []
        const workerQueue = []

        for (let i = 0; i < HASH_WORKERS; i++) {
            const w = new Worker("hashWorker.js")
            w.busy = false
            workerPool.push(w)
        }

        function hashChunk(chunk) {

            return new Promise(resolve => {

                workerQueue.push({ chunk, resolve })
                runHashQueue()

            })

        }

        function runHashQueue() {

            for (const worker of workerPool) {

                if (worker.busy) continue
                if (workerQueue.length === 0) return

                const job = workerQueue.shift()

                worker.busy = true

                worker.onmessage = e => {
                    worker.busy = false
                    job.resolve(e.data.hash)
                    runHashQueue()
                }

                worker.postMessage({ chunk: job.chunk })

            }

        }


        /* ---------------- START ---------------- */

        async function startUpload() {

            file = document.getElementById("file").files[0]

            if (!file) return alert("select file")

            const init = await fetch("/upload/init", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    filename: file.name,
                    size: file.size,
                    token: uploadId
                })
            })

            const data = await init.json()

            uploadId = data.uploadId
            CHUNK_SIZE = data.chunkSize

            localStorage.setItem("uploadToken", uploadId)

            const status = await fetch(`/upload/status?uploadId=${uploadId}`)
            const s = await status.json()

            totalChunks = s.totalChunks

            const uploadedSet = new Set(s.uploadedChunks)

            nextChunk = 0

            while (uploadedSet.has(nextChunk)) {
                nextChunk++
            }

            completedChunks = s.uploadedChunks.length

            startWorkers()

        }


        /* ---------------- WORKERS ---------------- */

        async function startWorkers() {

            let workers = []

            for (let i = 0; i < PARALLEL; i++) {
                workers.push(worker())
            }

            await Promise.all(workers)

            if (completedChunks === totalChunks) {
                await completeUpload()
            }

        }

        async function worker() {

            while (true) {

                if (paused) return

                const chunkIndex = nextChunk++

                if (chunkIndex >= totalChunks) return

                const start = chunkIndex * CHUNK_SIZE
                const chunk = file.slice(start, start + CHUNK_SIZE)

                const hash = await hashChunk(chunk)

                const success = await uploadChunk(chunk, chunkIndex, hash)

                if (success) {

                    completedChunks++

                    updateProgress(
                        Math.min(completedChunks * CHUNK_SIZE, file.size),
                        file.size
                    )

                }

            }

        }


        /* ---------------- UPLOAD CHUNK ---------------- */

        async function uploadChunk(chunk, chunkIndex, hash) {

            let retries = 3

            while (retries--) {

                const res = await fetch("/upload/chunk", {
                    method: "PUT",
                    headers: {
                        "upload-id": uploadId,
                        "chunk-index": chunkIndex,
                        "chunk-hash": hash,
                        "Content-Type": "application/octet-stream"
                    },
                    body: chunk
                })

                if (res.ok) return true

                await new Promise(r => setTimeout(r, 1000))

            }

            throw new Error("chunk failed")

        }


        /* ---------------- PAUSE ---------------- */

        function pauseUpload() {
            paused = true
            document.getElementById("status").innerText = "Paused"
        }


        /* ---------------- RESUME ---------------- */

        async function resumeUpload() {

            paused = false

            const status = await fetch(`/upload/status?uploadId=${uploadId}`)
            const data = await status.json()

            const uploadedSet = new Set(data.uploadedChunks)

            nextChunk = 0

            while (uploadedSet.has(nextChunk)) {
                nextChunk++
            }

            completedChunks = data.uploadedChunks.length

            startWorkers()

        }


        /* ---------------- COMPLETE ---------------- */

        async function completeUpload() {

            const done = await fetch("/upload/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ uploadId })
            })

            const result = await done.json()
            if(result.error){
                alert("ERROR : "+result.error);
                return;
            }
            
            localStorage.removeItem("uploadToken")
            
            document.getElementById("status").innerText = "Upload complete"
            const url = `${location.origin}/file/${result.fileId}`
            document.getElementById("link").innerHTML = `<a href="${url}" target="_blank" download>${url}</a>`
            
            const form = document.getElementById('uploadForm');
            form.reset();
        }


        /* ---------------- PROGRESS ---------------- */

        function updateProgress(done, total) {

            const percent = Math.floor((done / total) * 100)

            document.getElementById("bar").style.width = percent + "%"

            document.getElementById("status").innerText = "Uploading " + percent + "%"

        }


        /* ---------------- DRAG DROP ---------------- */

        const drop = document.getElementById("drop")

        drop.addEventListener("dragover", e => {
            e.preventDefault()
        })

        drop.addEventListener("drop", e => {
            e.preventDefault()
            file = e.dataTransfer.files[0]
            document.getElementById("file").files = e.dataTransfer.files
        })

    </script>

</body>

</html>
